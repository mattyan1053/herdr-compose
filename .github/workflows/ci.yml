name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        # -x follows `source`d files so lib.sh is analysed in context.
        # --severity=warning skips info-level notes: unfollowable dynamic
        # `source` paths (SC1091) and the deliberately single-quoted fzf
        # bindings in tui.sh, where $HC_SELF must expand at execute time.
        run: shellcheck -x --severity=warning scripts/*.sh

  bats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats and jq
        run: |
          sudo apt-get update
          sudo apt-get install -y bats jq
      - name: Run tests
        run: bats tests/
