name: Release on merge to main

on:
  push:
    branches: [main]

# Avoid overlapping runs racing to create the same tag.
concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from herdr-plugin.toml
        id: version
        run: |
          set -euo pipefail
          version="$(sed -n 's/^version[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/p' herdr-plugin.toml | head -n1)"
          if [ -z "$version" ]; then
            echo "::error::Could not read version from herdr-plugin.toml"
            exit 1
          fi

          tag="v${version}"
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "Tag ${tag} already exists; version not bumped. Skipping release."
            echo "release=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version ${version}; will release ${tag}."
            echo "release=true" >> "$GITHUB_OUTPUT"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      # Creates the tag at the current main commit (which already contains the
      # matching toml version) and publishes a release with auto-generated notes.
      - name: Create tag and GitHub release
        if: steps.version.outputs.release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
